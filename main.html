<!DOCTYPE html>

<html>

<head>
	<meta charset=utf-8 />
		<title>Return first and last name from a form</title>
		<style type="text/css">
			body {margin: 30px;}
		</style> 
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<form id="form1" onsubmit="getFormvalue()">
		First name: <input type="text" name="fname" id="first"><br>
		Last name: <input type="text" name="lname" id="last"><br>
		<input type="submit" value="Submit" onclick="res()">
	</form>
	
    <script type="text/javascript" src="./script.js">
		function res(){
			let first=document.getElementById("first").value;
			let last=document.getElementById("last").value;
			alert(first +" "+ last);
		}
</script>

</body>

</html>
